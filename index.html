<main class="flex-1 p-6 lg:p-8">
    <div class="max-w-md mx-auto bg-gray-800 rounded-2xl p-8 shadow-xl border border-gray-700">
        <h2 class="text-3xl font-bold text-white mb-6 text-center sidebar-item-text-gradient">TIN Info Fetcher</h2>
        
        <div class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-2">NID Number</label>
                <input type="text" id="nid_input" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-white focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="Enter NID">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-400 mb-2">TIN Number</label>
                <input type="text" id="tin_input" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-white focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="Enter TIN">
            </div>

            <div class="grid grid-cols-2 gap-4 mt-8">
                <button onclick="handleFetch('NID')" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition transform hover:-translate-y-1">Search NID</button>
                <button onclick="handleFetch('TIN')" class="bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 rounded-lg transition transform hover:-translate-y-1">Search TIN</button>
            </div>
        </div>

        <div id="result-display" class="mt-8 hidden border-t border-gray-700 pt-6">
            <div id="data-container" class="space-y-3 bg-gray-900 p-4 rounded-xl">
                </div>
            <button id="downloadBtn" class="w-full mt-4 bg-green-600 hover:bg-green-700 text-white py-2 rounded-lg font-semibold hidden">
                📥 Download PDF Copy
            </button>
        </div>
    </div>
</main>

<script>
    function handleFetch(type) {
        const nid = document.getElementById('nid_input').value;
        const tin = document.getElementById('tin_input').value;
        const overlay = document.getElementById('blurOverlay');
        const resultDisplay = document.getElementById('result-display');
        const dataContainer = document.getElementById('data-container');
        const downloadBtn = document.getElementById('downloadBtn');

        // Show loading overlay
        overlay.classList.add('active');

        // API Call Simulation (এখানে আপনার API URL বসবে)
        setTimeout(() => {
            overlay.classList.remove('active');
            resultDisplay.classList.remove('hidden');

            // Sample JSON Data (API থেকে যে ফরম্যাটে ডেটা আসবে)
            const mockData = {
                "name": "Arif Ahmed",
                "nid": nid || "199XXXXXXX",
                "tin": tin || "428XXXXXXX",
                "circle": "Circle 12",
                "zone": "Zone 02, Dhaka",
                "status": "Active"
            };

            // Injecting Data into HTML
            dataContainer.innerHTML = `
                <div class="flex justify-between border-b border-gray-800 pb-2">
                    <span class="text-gray-500 text-sm">Full Name:</span>
                    <span class="text-white font-semibold">${mockData.name}</span>
                </div>
                <div class="flex justify-between border-b border-gray-800 pb-2">
                    <span class="text-gray-500 text-sm">TIN No:</span>
                    <span class="text-white font-semibold">${mockData.tin}</span>
                </div>
                <div class="flex justify-between border-b border-gray-800 pb-2">
                    <span class="text-gray-500 text-sm">NID No:</span>
                    <span class="text-white font-semibold">${mockData.nid}</span>
                </div>
                <div class="flex justify-between">
                    <span class="text-gray-500 text-sm">Status:</span>
                    <span class="text-green-500 font-bold">${mockData.status}</span>
                </div>
            `;
            downloadBtn.classList.remove('hidden');
        }, 2000); // 2 seconds delay for effect
    }
</script>
