<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TIN Admin Panel</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
</head>

<body class="bg-gray-100 flex">

<!-- Sidebar -->
<div class="w-64 bg-blue-900 text-white h-screen p-4">
    <h2 class="text-xl font-bold mb-6">NBR Panel</h2>

    <button onclick="showPage('dashboard')" class="block mb-3">📊 Dashboard</button>
    <button onclick="showPage('create')" class="block mb-3">➕ Create TIN</button>
    <button onclick="showPage('list')" class="block">📄 All Records</button>
</div>

<!-- Main -->
<div class="flex-1 p-6">

<!-- Dashboard -->
<div id="dashboard">
    <h1 class="text-2xl font-bold mb-4">Dashboard</h1>
    <div class="bg-white p-4 shadow rounded">
        Total Records: <span id="total"></span>
    </div>
</div>

<!-- Create -->
<div id="create" class="hidden">
    <h1 class="text-2xl mb-4">Create TIN</h1>

    <form onsubmit="createTIN(event)" class="space-y-3">
        <input id="name" placeholder="Name" class="w-full p-2 border">
        <input id="father" placeholder="Father Name" class="w-full p-2 border">
        <input id="address" placeholder="Address" class="w-full p-2 border">

        <button class="bg-blue-600 text-white px-4 py-2">Generate</button>
    </form>
</div>

<!-- List -->
<div id="list" class="hidden">
    <h1 class="text-2xl mb-4">All TIN</h1>
    <div id="listBox"></div>
</div>

</div>

<script>

// Page switch
function showPage(p){
    ["dashboard","create","list"].forEach(id=>{
        document.getElementById(id).classList.add("hidden");
    });
    document.getElementById(p).classList.remove("hidden");
}

// Generate TIN
function genTIN(){
    return Math.floor(100000000000 + Math.random()*900000000000);
}

// Create
function createTIN(e){
    e.preventDefault();

    let data = {
        tin: genTIN(),
        name: name.value,
        father: father.value,
        address: address.value
    };

    let db = JSON.parse(localStorage.getItem("db")) || [];
    db.push(data);
    localStorage.setItem("db", JSON.stringify(db));

    loadData();
    alert("TIN Created!");
}

// Load Data
function loadData(){
    let db = JSON.parse(localStorage.getItem("db")) || [];
    document.getElementById("total").innerText = db.length;

    let box = document.getElementById("listBox");
    box.innerHTML = "";

    db.reverse().forEach(item=>{
        let id = "qr"+item.tin;

        box.innerHTML += `
        <div class="bg-white p-4 mb-3 shadow rounded flex justify-between">
            <div>
                <b>${item.tin}</b><br>
                ${item.name}<br>
                ${item.address}
            </div>
            <div id="${id}"></div>
        </div>
        `;

        QRCode.toCanvas(document.getElementById(id), item.tin);
    });
}

loadData();

</script>

</body>
</html>
