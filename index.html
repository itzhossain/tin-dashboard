<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TIN Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white flex">

<!-- Sidebar -->
<div class="w-64 bg-black h-screen p-4">
    <h2 class="text-xl font-bold mb-6">Dashboard</h2>

    <button onclick="showPage('home')" class="block mb-3">🏠 Home</button>
    <button onclick="showPage('tin')" class="block">📄 TIN Make</button>
</div>

<!-- Main -->
<div class="flex-1 p-6">

<!-- Home -->
<div id="home">
    <h1 class="text-2xl font-bold">Welcome</h1>
</div>

<!-- TIN Page -->
<div id="tin" class="hidden">
    <h1 class="text-2xl mb-4">TIN Make</h1>

    <button onclick="setTIN()" class="bg-green-600 px-3 py-1 mb-3 rounded">
        🔄 New TIN
    </button>

    <form onsubmit="generateTIN(event)" class="space-y-3">

        <input id="tinNumber" class="w-full p-2 text-black" readonly>

        <input id="name" placeholder="Name" class="w-full p-2 text-black">

        <input id="father" placeholder="Father Name" class="w-full p-2 text-black">

        <input id="address" placeholder="Address" class="w-full p-2 text-black">

        <button class="bg-blue-600 px-4 py-2 rounded">Submit</button>

    </form>

    <!-- History -->
    <div class="mt-6">
        <h2 class="text-xl">History</h2>
        <div id="historyBox"></div>
    </div>

</div>

</div>

<script>

// Page switch
function showPage(page){
    document.getElementById('home').classList.add('hidden');
    document.getElementById('tin').classList.add('hidden');
    document.getElementById(page).classList.remove('hidden');
}

// Generate 12 digit TIN
function newTIN(){
    return Math.floor(100000000000 + Math.random()*900000000000);
}

// Set TIN
function setTIN(){
    document.getElementById("tinNumber").value = newTIN();
}

// Load first TIN
setTIN();

// Load history
function loadHistory(){
    let history = JSON.parse(localStorage.getItem("tin_history")) || [];
    let box = document.getElementById("historyBox");

    box.innerHTML = "";

    history.slice().reverse().forEach(item => {
        box.innerHTML += `
        <div class="bg-gray-800 p-2 mt-2 rounded">
            ${item.tin} - ${item.name}
        </div>`;
    });
}

loadHistory();

// Submit → Print
function generateTIN(e){
    e.preventDefault();

    let tin = document.getElementById("tinNumber").value;
    let name = document.getElementById("name").value;
    let father = document.getElementById("father").value;
    let address = document.getElementById("address").value;

    // Save history
    let data = { tin, name, father, address };
    let history = JSON.parse(localStorage.getItem("tin_history")) || [];
    history.push(data);
    localStorage.setItem("tin_history", JSON.stringify(history));

    loadHistory();

    // Print window
    let win = window.open("", "_blank");
    win.document.write(`
        <html>
        <head>
        <title>TIN Certificate</title>
        </head>
        <body style="font-family:sans-serif;padding:20px">
        <h2>TIN Certificate (Demo)</h2>
        <p><b>TIN:</b> ${tin}</p>
        <p><b>Name:</b> ${name}</p>
        <p><b>Father:</b> ${father}</p>
        <p><b>Address:</b> ${address}</p>
        <button onclick="window.print()">Print</button>
        </body>
        </html>
    `);

    win.document.close();
}

</script>

</body>
</html>
