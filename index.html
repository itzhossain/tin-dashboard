<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TIN Demo Generator</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
</head>

<body class="bg-gray-900 text-white p-6">

<h1 class="text-2xl mb-4">TIN Generator (Demo)</h1>

<form onsubmit="generate(event)" class="space-y-3 max-w-md">
<input id="name" placeholder="Name" class="w-full p-2 text-black" required>
<input id="father" placeholder="Father Name" class="w-full p-2 text-black" required>
<input id="mother" placeholder="Mother Name" class="w-full p-2 text-black">
<input id="address" placeholder="Address" class="w-full p-2 text-black" required>

<button class="bg-blue-600 px-4 py-2 rounded">Generate</button>
</form>

<script>
function newTIN(){
    return Math.floor(100000000000 + Math.random()*900000000000);
}

function generate(e){
    e.preventDefault();

    let tin = newTIN();
    let name = document.getElementById("name").value;
    let father = document.getElementById("father").value;
    let mother = document.getElementById("mother").value;
    let address = document.getElementById("address").value;

    let win = window.open();

    win.document.write(`
<html>
<head>
<style>
body{font-family:Arial; padding:30px;}
.main{border:3px solid black; padding:20px; position:relative;}
.watermark{
position:absolute;
top:40%;
left:20%;
font-size:60px;
color:red;
opacity:0.15;
transform:rotate(-30deg);
}
.center{text-align:center;}
</style>
</head>

<body>

<div class="main">

<div class="watermark">DEMO</div>

<div class="center">
<h3>Government of Bangladesh</h3>
<h4>National Board of Revenue</h4>
<h4>TIN Certificate (Sample)</h4>
</div>

<h2 class="center">TIN: ${tin}</h2>

<p>This is to certify that <b>${name}</b> is a registered taxpayer (Demo System).</p>

<h3>Taxpayer Details:</h3>

<p>1) Name: <b>${name}</b></p>
<p>2) Father's Name: <b>${father}</b></p>
<p>3) Mother's Name: <b>${mother}</b></p>
<p>4) Address: <b>${address}</b></p>

<br>

<canvas id="qr"></canvas>

<br><br>
<p>Date: ${new Date().toDateString()}</p>

<br>
<button onclick="window.print()">Print</button>

</div>

<script>
QRCode.toCanvas(document.getElementById('qr'), '${tin}');
</script>

</body>
</html>
`);
}
</script>

</body>
</html>
