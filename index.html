<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TIN Demo System</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
</head>

<body class="bg-gray-900 text-white p-6">

<h2 class="text-2xl mb-4 font-bold">Manual TIN Form</h2>

<form id="form" class="space-y-3 max-w-xl">

<input id="tin" class="w-full p-2 text-black" placeholder="TIN Number (optional)">
<input id="circle" class="w-full p-2 text-black" placeholder="Taxes Circle">
<input id="zone" class="w-full p-2 text-black" placeholder="Taxes Zone">
<input id="name" class="w-full p-2 text-black" placeholder="Name">
<input id="dob" class="w-full p-2 text-black" placeholder="Date of Birth">
<input id="father" class="w-full p-2 text-black" placeholder="Father Name">
<input id="mother" class="w-full p-2 text-black" placeholder="Mother Name">
<input id="current" class="w-full p-2 text-black" placeholder="Current Address">
<input id="permanent" class="w-full p-2 text-black" placeholder="Permanent Address">
<input id="date" class="w-full p-2 text-black" placeholder="Date">
<input id="office" class="w-full p-2 text-black" placeholder="Office Address">

<button class="bg-blue-600 px-4 py-2 rounded">Submit</button>

</form>

<!-- RESULT -->
<div id="result" class="hidden mt-6"></div>

<script>

function newTIN(){
 return Math.floor(100000000000 + Math.random()*900000000000);
}

document.getElementById("form").addEventListener("submit", function(e){
 e.preventDefault();

 let tin = document.getElementById("tin").value || newTIN();

 let data = {
  circle: document.getElementById("circle").value,
  zone: document.getElementById("zone").value,
  name: document.getElementById("name").value,
  dob: document.getElementById("dob").value,
  father: document.getElementById("father").value,
  mother: document.getElementById("mother").value,
  current: document.getElementById("current").value,
  permanent: document.getElementById("permanent").value,
  date: document.getElementById("date").value,
  office: document.getElementById("office").value
 };

 let html = `
 <div class="bg-white text-black p-6 shadow-lg border border-black max-w-3xl mx-auto">

 <h2 class="text-center font-bold text-lg">Government of Bangladesh</h2>
 <h3 class="text-center font-bold">National Board of Revenue</h3>
 <h3 class="text-center mb-4">TIN Certificate (Demo)</h3>

 <h2 class="text-center text-xl font-bold underline mb-4">TIN: ${tin}</h2>

 <p class="mb-3">
 This is to certify that <b>${data.name}</b> is a registered taxpayer under 
 <b>${data.circle}</b>, Zone <b>${data.zone}</b>.
 </p>

 <h4 class="font-bold mt-3">Taxpayer Details:</h4>

 <table class="w-full border mt-2 border-collapse">
 <tr><td class="border p-2">Name</td><td class="border p-2">${data.name}</td></tr>
 <tr><td class="border p-2">Father</td><td class="border p-2">${data.father}</td></tr>
 <tr><td class="border p-2">Mother</td><td class="border p-2">${data.mother}</td></tr>
 <tr><td class="border p-2">DOB</td><td class="border p-2">${data.dob}</td></tr>
 <tr><td class="border p-2">Current Address</td><td class="border p-2">${data.current}</td></tr>
 <tr><td class="border p-2">Permanent Address</td><td class="border p-2">${data.permanent}</td></tr>
 </table>

 <div class="flex justify-between mt-6 items-center">

 <div class="text-xs w-1/3">
 <b>Note:</b><br>
 This is a demo certificate for practice only.
 </div>

 <div class="text-center w-1/3">
 <canvas id="qr"></canvas>
 </div>

 <div class="text-xs w-1/3 text-right">
 <b>Office</b><br>
 ${data.office}
 </div>

 </div>

 <p class="mt-4">Date: ${data.date}</p>

 <div class="text-center mt-4">
 <button onclick="window.print()" class="bg-blue-600 text-white px-4 py-2 rounded">Print</button>
 </div>

 </div>
 `;

 let result = document.getElementById("result");
 result.innerHTML = html;
 result.classList.remove("hidden");

 QRCode.toCanvas(document.getElementById("qr"), tin);
});

</script>

</body>
</html>
