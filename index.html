<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TIN System</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
</head>

<body class="bg-gray-900 text-white p-6">

<h2 class="text-2xl mb-4">Manual TIN Form</h2>

<form id="form" class="space-y-3 max-w-xl">

<input id="name" placeholder="Name" class="w-full p-2 text-black" required>
<input id="father" placeholder="Father Name" class="w-full p-2 text-black">
<input id="address" placeholder="Address" class="w-full p-2 text-black">

<button class="bg-blue-600 px-4 py-2">Submit</button>

</form>

<!-- RESULT -->
<div id="result" class="hidden bg-white text-black mt-6 p-6"></div>

<script>

function newTIN(){
 return Math.floor(100000000000 + Math.random()*900000000000);
}

document.getElementById("form").addEventListener("submit", function(e){
 e.preventDefault();

 let tin = newTIN();
 let name = document.getElementById("name").value;
 let father = document.getElementById("father").value;
 let address = document.getElementById("address").value;

 let html = `
 <h2 style="text-align:center">TIN: ${tin}</h2>
 <p>Name: <b>${name}</b></p>
 <p>Father: <b>${father}</b></p>
 <p>Address: <b>${address}</b></p>
 <canvas id="qr"></canvas>
 `;

 let result = document.getElementById("result");
 result.innerHTML = html;
 result.classList.remove("hidden");

 QRCode.toCanvas(document.getElementById('qr'), tin);
});

</script>

</body>
</html>
